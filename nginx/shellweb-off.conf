# 仅图床 — 网站关闭
server {
    listen 80 default_server;
    server_name _;
    root /home/shell/shellweb/_site;
    index index.html;

    # 图床 - 永久开放
    location /images/ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 其余路径全部 404
    location / {
        return 404;
    }
}
