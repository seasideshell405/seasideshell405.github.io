# 全站开放 — 图床 + 网站预览
server {
    listen 80 default_server;
    server_name _;
    root /home/shell/shellweb/_site;
    index index.html;

    # 图床 - 永久开放
    location /images/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 全站
    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}
